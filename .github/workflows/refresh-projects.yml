name: Refresh portfolio projects

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-portfolio-projects
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh repository data
        run: node scripts/refresh-projects.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/projects.json; then
            echo "Project data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          git commit -m "Refresh portfolio project data"
          git push
